<svg width="180" height="180" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e2d5a"/>
    </linearGradient>
    <linearGradient id="trunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e2433"/>
      <stop offset="50%" stop-color="#2a3347"/>
      <stop offset="100%" stop-color="#161b2a"/>
    </linearGradient>
    <linearGradient id="leaf-dark" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e3a7a"/>
      <stop offset="100%" stop-color="#152a5e"/>
    </linearGradient>
    <linearGradient id="leaf-mid" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3b6fd4"/>
      <stop offset="100%" stop-color="#2855b8"/>
    </linearGradient>
    <linearGradient id="leaf-light" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#6b9fe8"/>
      <stop offset="100%" stop-color="#4a80d4"/>
    </linearGradient>
    <linearGradient id="fruit" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#a8c8f8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7aaef0" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e2d5a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2a3d78" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1e2d5a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glass" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a80d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4a80d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <rect width="200" height="200" rx="44" fill="url(#glass)"/>

  <!-- Glow behind tree -->
  <ellipse cx="100" cy="90" rx="70" ry="65" fill="url(#glow)"/>

  <!-- Ground -->
  <ellipse cx="100" cy="178" rx="72" ry="8" fill="url(#ground)"/>
  <ellipse cx="58" cy="176" rx="7" ry="5" fill="url(#fruit)" opacity="0.5"/>
  <ellipse cx="148" cy="177" rx="6" ry="4.5" fill="url(#fruit)" opacity="0.4"/>

  <!-- Ground plants -->
  <path d="M38 174 C36 168 32 165 30 160" stroke="#3b6fd4" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <ellipse cx="29" cy="159" rx="5" ry="3" fill="#3b6fd4" transform="rotate(-20 29 159)" opacity="0.6"/>
  <path d="M162 174 C164 168 168 165 170 160" stroke="#3b6fd4" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <ellipse cx="171" cy="159" rx="5" ry="3" fill="#3b6fd4" transform="rotate(20 171 159)" opacity="0.6"/>

  <!-- Trunk -->
  <path d="M93 174 C91 155 89 135 91 110 L109 110 C111 135 109 155 107 174 Z" fill="url(#trunk)"/>
  <path d="M99 174 C98 145 97 120 99 108" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.08" fill="none"/>

  <!-- Branches -->
  <path d="M94 130 C82 122 68 118 56 112" stroke="url(#trunk)" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M106 125 C118 117 132 114 144 108" stroke="url(#trunk)" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M88 118 C76 108 62 102 50 96" stroke="url(#trunk)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M112 115 C126 106 140 100 152 94" stroke="url(#trunk)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M96 112 C86 100 74 90 64 82" stroke="url(#trunk)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M104 110 C114 98 126 88 136 80" stroke="url(#trunk)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M100 108 C100 94 100 82 100 70" stroke="url(#trunk)" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Deep leaf layer -->
  <ellipse cx="100" cy="88" rx="54" ry="46" fill="url(#leaf-dark)" opacity="0.85"/>
  <ellipse cx="58" cy="100" rx="32" ry="27" fill="url(#leaf-dark)" opacity="0.85"/>
  <ellipse cx="142" cy="98" rx="33" ry="28" fill="url(#leaf-dark)" opacity="0.85"/>
  <ellipse cx="72" cy="78" rx="26" ry="22" fill="url(#leaf-dark)" opacity="0.85"/>
  <ellipse cx="128" cy="76" rx="27" ry="22" fill="url(#leaf-dark)" opacity="0.85"/>

  <!-- Mid leaf layer -->
  <ellipse cx="100" cy="78" rx="46" ry="40" fill="url(#leaf-mid)"/>
  <ellipse cx="62" cy="92" rx="28" ry="24" fill="url(#leaf-mid)"/>
  <ellipse cx="138" cy="90" rx="29" ry="24" fill="url(#leaf-mid)"/>
  <ellipse cx="78" cy="66" rx="22" ry="19" fill="url(#leaf-mid)"/>
  <ellipse cx="122" cy="64" rx="23" ry="19" fill="url(#leaf-mid)"/>
  <ellipse cx="100" cy="58" rx="24" ry="20" fill="url(#leaf-mid)"/>

  <!-- Light leaf highlights -->
  <ellipse cx="100" cy="68" rx="32" ry="26" fill="url(#leaf-light)" opacity="0.9"/>
  <ellipse cx="78" cy="76" rx="18" ry="15" fill="url(#leaf-light)" opacity="0.9"/>
  <ellipse cx="122" cy="74" rx="19" ry="15" fill="url(#leaf-light)" opacity="0.9"/>
  <ellipse cx="100" cy="50" rx="18" ry="16" fill="url(#leaf-light)" opacity="0.9"/>
  <ellipse cx="68" cy="84" rx="14" ry="12" fill="url(#leaf-light)" opacity="0.7"/>
  <ellipse cx="132" cy="82" rx="15" ry="12" fill="url(#leaf-light)" opacity="0.7"/>

  <!-- Individual scattered leaves -->
  <ellipse cx="54" cy="88" rx="9" ry="6" fill="#6b9fe8" opacity="0.7" transform="rotate(-30 54 88)"/>
  <ellipse cx="48" cy="100" rx="9" ry="6" fill="#3b6fd4" opacity="0.8" transform="rotate(15 48 100)"/>
  <ellipse cx="60" cy="108" rx="9" ry="6" fill="#1e3a7a" opacity="0.9" transform="rotate(-10 60 108)"/>
  <ellipse cx="146" cy="86" rx="9" ry="6" fill="#6b9fe8" opacity="0.7" transform="rotate(25 146 86)"/>
  <ellipse cx="152" cy="98" rx="9" ry="6" fill="#3b6fd4" opacity="0.8" transform="rotate(-15 152 98)"/>
  <ellipse cx="140" cy="110" rx="9" ry="6" fill="#1e3a7a" opacity="0.9" transform="rotate(10 140 110)"/>
  <ellipse cx="64" cy="68" rx="9" ry="6" fill="#6b9fe8" opacity="0.7" transform="rotate(-20 64 68)"/>
  <ellipse cx="136" cy="66" rx="9" ry="6" fill="#3b6fd4" opacity="0.8" transform="rotate(20 136 66)"/>
  <ellipse cx="100" cy="40" rx="9" ry="6" fill="#1e3a7a" opacity="0.9" transform="rotate(0 100 40)"/>
  <ellipse cx="84" cy="54" rx="9" ry="6" fill="#6b9fe8" opacity="0.7" transform="rotate(-15 84 54)"/>
  <ellipse cx="116" cy="52" rx="9" ry="6" fill="#3b6fd4" opacity="0.8" transform="rotate(15 116 52)"/>

  <!-- Fruits / glowing drops -->
  <g>
    <line x1="72" y1="96" x2="72" y2="99" stroke="#2a3347" stroke-width="1"/>
    <ellipse cx="72" cy="105" rx="6" ry="8" fill="url(#fruit)"/>
    <ellipse cx="70.5" cy="103" rx="2" ry="2.5" fill="#ffffff" opacity="0.35"/>
  </g>
  <g>
    <line x1="88" y1="106" x2="88" y2="109" stroke="#2a3347" stroke-width="1"/>
    <ellipse cx="88" cy="115" rx="5" ry="7" fill="url(#fruit)"/>
    <ellipse cx="86.5" cy="113" rx="1.8" ry="2.2" fill="#ffffff" opacity="0.35"/>
  </g>
  <g>
    <line x1="112" y1="104" x2="112" y2="107" stroke="#2a3347" stroke-width="1"/>
    <ellipse cx="112" cy="113" rx="5" ry="7" fill="url(#fruit)"/>
    <ellipse cx="110.5" cy="111" rx="1.8" ry="2.2" fill="#ffffff" opacity="0.35"/>
  </g>
  <g>
    <line x1="128" y1="94" x2="128" y2="97" stroke="#2a3347" stroke-width="1"/>
    <ellipse cx="128" cy="103" rx="6" ry="8" fill="url(#fruit)"/>
    <ellipse cx="126.5" cy="101" rx="2" ry="2.5" fill="#ffffff" opacity="0.35"/>
  </g>
  <g>
    <line x1="58" y1="103" x2="58" y2="106" stroke="#2a3347" stroke-width="1"/>
    <ellipse cx="58" cy="112" rx="5" ry="7" fill="url(#fruit)"/>
    <ellipse cx="56.5" cy="110" rx="1.8" ry="2.2" fill="#ffffff" opacity="0.35"/>
  </g>
  <g>
    <line x1="142" y1="101" x2="142" y2="104" stroke="#2a3347" stroke-width="1"/>
    <ellipse cx="142" cy="110" rx="5" ry="7" fill="url(#fruit)"/>
    <ellipse cx="140.5" cy="108" rx="1.8" ry="2.2" fill="#ffffff" opacity="0.35"/>
  </g>
  <g>
    <line x1="100" y1="86" x2="100" y2="89" stroke="#2a3347" stroke-width="1"/>
    <ellipse cx="100" cy="95" rx="6" ry="8" fill="url(#fruit)"/>
    <ellipse cx="98.5" cy="93" rx="2" ry="2.5" fill="#ffffff" opacity="0.35"/>
  </g>
  <g>
    <line x1="82" y1="79" x2="82" y2="82" stroke="#2a3347" stroke-width="1"/>
    <ellipse cx="82" cy="88" rx="5" ry="7" fill="url(#fruit)"/>
    <ellipse cx="80.5" cy="86" rx="1.8" ry="2.2" fill="#ffffff" opacity="0.35"/>
  </g>
  <g>
    <line x1="118" y1="77" x2="118" y2="80" stroke="#2a3347" stroke-width="1"/>
    <ellipse cx="118" cy="86" rx="5" ry="7" fill="url(#fruit)"/>
    <ellipse cx="116.5" cy="84" rx="1.8" ry="2.2" fill="#ffffff" opacity="0.35"/>
  </g>

  <!-- Glass sheen -->
  <rect width="200" height="200" rx="44" fill="url(#glass)" opacity="0.5"/>
  <!-- Border -->
  <rect width="200" height="200" rx="44" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.12"/>
</svg>
