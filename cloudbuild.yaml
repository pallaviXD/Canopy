# ─────────────────────────────────────────────────────────────────────────────
# Canopy — Google Cloud Build CI/CD Pipeline
# Deploys to Cloud Run on every push to main branch.
#
# Setup:
#   1. Enable APIs:
#      gcloud services enable cloudbuild.googleapis.com run.googleapis.com \
#        artifactregistry.googleapis.com secretmanager.googleapis.com
#
#   2. Create Artifact Registry repo:
#      gcloud artifacts repositories create canopy \
#        --repository-format=docker \
#        --location=us-central1
#
#   3. Store secrets in Secret Manager:
#      gcloud secrets create GEMINI_API_KEY --data-file=-
#      gcloud secrets create FIREBASE_API_KEY --data-file=-
#      (etc. for each secret below)
#
#   4. Connect repo in Cloud Build and trigger on push to main.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _PROJECT_ID: 'YOUR_PROJECT_ID'           # <-- replace with your GCP project ID
  _REGION: 'us-central1'
  _SERVICE_NAME: 'canopy'
  _REGISTRY: 'us-central1-docker.pkg.dev'
  _REPO: 'canopy'
  _IMAGE: '${_REGISTRY}/${_PROJECT_ID}/${_REPO}/${_SERVICE_NAME}'

steps:
  # ── Step 1: Build Docker image ──
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--tag'
      - '${_IMAGE}:${SHORT_SHA}'
      - '--tag'
      - '${_IMAGE}:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=$$FIREBASE_API_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$$FIREBASE_AUTH_DOMAIN'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=$$FIREBASE_PROJECT_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$$FIREBASE_STORAGE_BUCKET'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$$FIREBASE_SENDER_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=$$FIREBASE_APP_ID'
      - '--cache-from'
      - '${_IMAGE}:latest'
      - '.'
    secretEnv:
      - 'FIREBASE_API_KEY'
      - 'FIREBASE_AUTH_DOMAIN'
      - 'FIREBASE_PROJECT_ID'
      - 'FIREBASE_STORAGE_BUCKET'
      - 'FIREBASE_SENDER_ID'
      - 'FIREBASE_APP_ID'

  # ── Step 2: Push image to Artifact Registry ──
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - '${_IMAGE}'

  # ── Step 3: Deploy to Cloud Run ──
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_IMAGE}:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--set-env-vars'
      - 'NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1'

# Available secrets from Secret Manager
availableSecrets:
  secretManager:
    - versionName: 'projects/${_PROJECT_ID}/secrets/GEMINI_API_KEY/versions/latest'
      env: 'GEMINI_API_KEY'
    - versionName: 'projects/${_PROJECT_ID}/secrets/FIREBASE_API_KEY/versions/latest'
      env: 'FIREBASE_API_KEY'
    - versionName: 'projects/${_PROJECT_ID}/secrets/FIREBASE_AUTH_DOMAIN/versions/latest'
      env: 'FIREBASE_AUTH_DOMAIN'
    - versionName: 'projects/${_PROJECT_ID}/secrets/FIREBASE_PROJECT_ID/versions/latest'
      env: 'FIREBASE_PROJECT_ID'
    - versionName: 'projects/${_PROJECT_ID}/secrets/FIREBASE_STORAGE_BUCKET/versions/latest'
      env: 'FIREBASE_STORAGE_BUCKET'
    - versionName: 'projects/${_PROJECT_ID}/secrets/FIREBASE_SENDER_ID/versions/latest'
      env: 'FIREBASE_SENDER_ID'
    - versionName: 'projects/${_PROJECT_ID}/secrets/FIREBASE_APP_ID/versions/latest'
      env: 'FIREBASE_APP_ID'

# Build artifacts
images:
  - '${_IMAGE}:${SHORT_SHA}'
  - '${_IMAGE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
